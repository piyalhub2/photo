<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonir Shaik</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0c10; color: #c5a059; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ffffff; margin-bottom: 20px; }
        .visit-btn { display: inline-block; padding: 12px 30px; border: 2px solid #c5a059; border-radius: 25px; color: #c5a059; text-decoration: none; font-weight: 600; margin-bottom: 40px; transition: 0.4s; }
        .visit-btn:hover { background-color: #c5a059; color: #000; box-shadow: 0 0 20px #c5a059; }
        
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .photo-card { position: relative; width: 200px; height: 260px; border-radius: 12px; overflow: hidden; background: #1a1a1a; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s ease; cursor: pointer; }
        .photo-card img.loaded { opacity: 1; }
        
        .dl-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; }
        
        .lightbox { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .lightbox img { max-width: 90%; max-height: 80vh; border-radius: 12px; }
    </style>
</head>
<body>

    <h1>Tonir Shaik</h1>
    <a href="https://sites.google.com/view/tonirshaik2/" target="_blank" class="visit-btn">🌐 VISIT MY OFFICIAL GOOGLE SITE</a>

    <div class="gallery" id="gallery"></div>

    <div id="myLightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lightboxImg" src="">
    </div>

    <script>
        const csvUrl = 'https://raw.githubusercontent.com/tonirshaik/tonirshaik/refs/heads/main/Tonir%20photo%20Link.txt?t=' + Date.now();
        
        fetch(csvUrl)
            .then(res => res.text())
            .then(data => {
                const gallery = document.getElementById('gallery');
                const links = data.split('\n').filter(l => l.trim() !== '');
                
                links.forEach((url, i) => {
                    const cleanUrl = url.trim();
                    if(cleanUrl.startsWith('http')) {
                        const div = document.createElement('div');
                        div.className = 'photo-card';
                        div.innerHTML = `
                            <div class="dl-btn" onclick="event.stopPropagation(); window.open('${cleanUrl}', '_blank')">↓</div>
                            <img src="${cleanUrl}" loading="lazy" onload="this.classList.add('loaded')" onclick="document.getElementById('lightboxImg').src='${cleanUrl}'; document.getElementById('myLightbox').style.display='flex'">
                        `;
                        gallery.appendChild(div);
                    }
                });
            });
    </script>
</body>
</html>
