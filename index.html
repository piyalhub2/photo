<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonir Shaik</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0c10; color: #c5a059; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ffffff; margin-bottom: 20px; }
        .visit-btn { display: inline-block; padding: 12px 30px; border: 2px solid #c5a059; border-radius: 25px; color: #c5a059; text-decoration: none; font-weight: 600; margin-bottom: 40px; transition: 0.4s; }
        .visit-btn:hover { background-color: #c5a059; color: #000; box-shadow: 0 0 20px #c5a059; }
        
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 80px; }
        .photo-card { position: relative; width: 200px; height: 260px; cursor: pointer; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5); transition: transform 0.4s; }
        .photo-card:hover { transform: translateY(-5px); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .dl-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; }
        
        .lightbox { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .lightbox-content { position: relative; max-width: 80%; }
        .lightbox-content img { max-height: 80vh; border-radius: 12px; }
    </style>
</head>
<body>

    <h1>Tonir Shaik</h1>
    <a href="https://sites.google.com/view/tonirshaik2/" target="_blank" class="visit-btn">🌐 VISIT MY OFFICIAL GOOGLE SITE</a>

    <div class="gallery" id="gallery">Loading Gallery...</div>

    <div id="myLightbox" class="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <img id="lightboxImg" src="">
        </div>
    </div>

    <script>
        const csvUrl = 'https://raw.githubusercontent.com/piyalhub2/photo/refs/heads/main/Tonir%20photo%20Link.txt?t=' + new Date().getTime();
        
        fetch(csvUrl)
            .then(res => res.text())
            .then(data => {
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                const links = data.split('\n').filter(l => l.trim() !== '');
                
                links.forEach((url, i) => {
                    const cleanUrl = url.trim();
                    if(cleanUrl) {
                        const div = document.createElement('div');
                        div.className = 'photo-card';
                        div.innerHTML = `
                            <div class="dl-btn" onclick="downloadImage('${cleanUrl}')">↓</div>
                            <img src="${cleanUrl}" loading="lazy" onclick="openLightbox('${cleanUrl}')">
                        `;
                        gallery.appendChild(div);
                    }
                });
            });

        function openLightbox(url) {
            document.getElementById("lightboxImg").src = url;
            document.getElementById("myLightbox").style.display = "flex";
        }
        function closeLightbox() { document.getElementById("myLightbox").style.display = "none"; }

        async function downloadImage(url) {
            const response = await fetch(url);
            const blob = await response.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Tonir-Photo.jpg';
            a.click();
        }
    </script>
</body>
</html>
