<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonir Shaik</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0c10; color: #c5a059; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ffffff; margin-bottom: 20px; }
        .visit-btn { display: inline-block; padding: 12px 30px; border: 2px solid #c5a059; border-radius: 25px; color: #c5a059; text-decoration: none; font-weight: 600; margin-bottom: 40px; transition: 0.3s; }
        .visit-btn:hover { background-color: #c5a059; color: #0b0c10; }
        
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .photo-card { position: relative; width: 200px; height: 260px; cursor: pointer; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .photo-card:hover img { transform: scale(1.05); }
        
        /* প্রিমিয়াম আধুনিক ডাউনলোড বাটন */
        .dl-btn { 
            position: absolute; top: 10px; right: 10px; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; width: 28px; height: 28px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 10; transition: all 0.3s ease;
            font-size: 14px;
        }
        .dl-btn:hover { background: #c5a059; transform: scale(1.1); }
        
        .lightbox { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .lightbox-content { position: relative; max-width: 80%; }
        .lightbox-content img { max-height: 80vh; border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        /* লাইটবক্স বা পপআপের ডাউনলোড বাটন */
        .lightbox .dl-btn { 
            top: 15px; right: 15px; 
            width: 32px; height: 32px; 
            font-size: 16px; 
        }
    </style>
</head>
<body>

    <h1>Tonir Shaik
