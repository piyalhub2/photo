<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonir Shaik</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0c10; color: #c5a059; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ffffff; margin-bottom: 20px; }
        .visit-btn { display: inline-block; padding: 12px 30px; border: 2px solid #c5a059; border-radius: 25px; color: #c5a059; text-decoration: none; font-weight: 600; margin-bottom: 40px; transition: 0.3s; }
        .visit-btn:hover { background-color: #c5a059; color: #0b0c10; }
        
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .photo-card { position: relative; width: 200px; height: 260px; cursor: pointer; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* প্রিমিয়াম ডাউনলোড বাটন */
        .premium-dl { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); color: #c5a059; border: 1px solid #c5a059; padding: 6px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; text-transform: uppercase; transition: 0.3s; z-index: 5; }
        .premium-dl:hover { background: #c5a059; color: #000; }
        
        .lightbox { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox-content { position: relative; max-width: 80%; }
        .lightbox-content img { max-height: 80vh; border-radius: 8px; }
        
        /* বড় ছবির নিচের বাটন */
        .big-dl-btn { display: block; margin-top: 15px; background: #c5a059; color: #000; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Tonir Shaik</h1>
    <a href="https://sites.google.com/view/tonirshaik2/" target="_blank" class="visit-btn">🌐 VISIT MY OFFICIAL GOOGLE SITE</a>

    <div class="gallery" id="gallery"></div>

    <div id="myLightbox" class="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <img id="lightboxImg" src="">
            <a id="popupDl" href="#" class="big-dl-btn" download>PREMIUM DOWNLOAD</a>
        </div>
    </div>

    <footer style="margin-top: 80px; padding: 20px; border-top: 1px solid #333;">
        <div style="color: #fff;">Tonir Shaik | Official Photo Gallery</div>
        <div style="font-size: 12px; color: #666;">© 2026 Tonir Shaik. All Rights Reserved.</div>
    </footer>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT6wwhCaP2ieMo_2Y08kbFai3iK2g2AO8StNvCxbBTm_gFOKk3yCQ82y4IkOfwwtKtNtbxv-4vWBoIb/pub?output=csv';
        
        fetch(csvUrl).then(res => res.text()).then(data => {
            const links = data.split('\n').filter(l => l.trim() !== '');
            const gallery = document.getElementById('gallery');
            links.forEach((url, i) => {
                const cleanUrl = url.trim();
                gallery.innerHTML += `
                    <div class="photo-card" onclick="openLightbox('${cleanUrl}')">
                        <button class="premium-dl" onclick="downloadImage('${cleanUrl}', 'Tonir-Photo-${i+1}.jpg'); event.stopPropagation();">Download</button>
                        <img src="${cleanUrl}">
                    </div>
                `;
            });
        });

        function openLightbox(url) {
            document.getElementById("lightboxImg").src = url;
            document.getElementById("popupDl").href = url;
            document.getElementById("myLightbox").style.display = "flex";
        }
        function closeLightbox() { document.getElementById("myLightbox").style.display = "none"; }

        // সরাসরি ডাউনলোডের জন্য ফাংশন
        function downloadImage(url, filename) {
            fetch(url).then(res => res.blob()).then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        }
    </script>
</body>
</html>
