<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonir Shaik - Personal Documents Web</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            background-color: #ffffff;
            color: #333;
            min-height: 100vh;
        }

        /* বাম পাশের সাইডবার মেনু */
        .sidebar {
            width: 280px;
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        .sidebar-profile {
            text-align: center;
            padding: 10px 20px 20px 20px;
            border-bottom: 1px solid #333;
        }

        .sidebar-profile img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
            margin-bottom: 10px;
        }

        .sidebar-profile h3 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .sidebar-menu {
            list-style: none;
            padding-top: 15px;
        }

        .sidebar-menu li a {
            display: block;
            padding: 12px 20px;
            color: #cccccc;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        /* মাউস নিলে বা একটিভ থাকলে কালার পরিবর্তন */
        .sidebar-menu li a:hover, .sidebar-menu li a.active {
            color: #ffeb3b; /* হলুদ কালার */
            background-color: #2a2a2a;
            border-left: 4px solid #ffeb3b;
        }

        /* মূল কন্টেন্ট এরিয়া (ডান পাশে) */
        .main-content {
            margin-left: 280px;
            width: calc(100% - 280px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ওপরের ব্যানার */
        .hero-banner {
            background: linear-gradient(135deg, #0b1e36 0%, #16365c 100%);
            color: white;
            padding: 40px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            min-height: 250px;
        }

        .banner-text h1 {
            font-size: 45px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .banner-text h2 {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* অডিও ওয়েভ ইফেক্ট */
        .wave-icon {
            display: inline-flex;
            gap: 3px;
            align-items: center;
        }
        .wave-icon span {
            width: 3px;
            height: 20px;
            background-color: #fff;
            animation: bounce 0.8s infinite alternate;
        }
        .wave-icon span:nth-child(2) { height: 30px; animation-delay: 0.2s; }
        .wave-icon span:nth-child(3) { height: 15px; animation-delay: 0.4s; }
        .wave-icon span:nth-child(4) { height: 25px; animation-delay: 0.1s; }

        .banner-text p {
            font-size: 16px;
            color: #b0c4de;
        }

        /* ব্যানারের গোল ফ্রেমের ছবি */
        .banner-img-container {
            position: relative;
        }

        .banner-img {
            width: 180px;
            height: 180px;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            background: url('https://via.placeholder.com/180') center/cover;
            border: 4px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
        }

        /* সোশ্যাল মিডিয়া আইকন বার */
        .social-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            background-color: #f9f9f9;
            border-bottom: 1px solid #eee;
        }

        .social-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: transform 0.3s;
        }

        .social-icon:hover { transform: scale(1.1); }
        .fb { background-color: #3b5998; }
        .insta { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .tiktok { background-color: #000000; }
        .whatsapp { background-color: #25D366; }
        .telegram { background-color: #0088cc; }
        .maps { background-color: #4285F4; }

        /* মাঝখানের কন্টেন্ট */
        .content-body {
            padding: 40px;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            flex: 1;
        }

        .card-box {
