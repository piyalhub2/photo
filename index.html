<!-- আপনার ওয়েবসাইটের গ্যালারির পরে এই ফুটারটি থাকবে -->
    <footer style="margin-top: 80px; padding: 40px; border-top: 1px solid rgba(197, 160, 89, 0.2); text-align: center;">
        <div style="font-weight: 600; color: #fff; margin-bottom: 8px;">Tonir Shaik | Official Photo Gallery</div>
        <div style="font-size: 13px; color: #c5a059;">© 2026 Tonir Shaik. All Rights Reserved.</div>
    </footer>

    <script>
        // আপনার জাভাস্ক্রিপ্ট কোড আগের মতোই থাকবে...
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT6wwhCaP2ieMo_2Y08kbFai3iK2g2AO8StNvCxbBTm_gFOKk3yCQ82y4IkOfwwtKtNtbxv-4vWBoIb/pub?output=csv';
        
        fetch(csvUrl)
            .then(res => res.text())
            .then(data => {
                const gallery = document.getElementById('gallery');
                const links = data.split('\n').filter(l => l.trim() !== '');
                
                links.forEach((url, i) => {
                    const cleanUrl = url.trim();
                    if(cleanUrl.startsWith('http')) {
                        const div = document.createElement('div');
                        div.className = 'photo-card';
                        div.innerHTML = `
                            <div class="dl-btn" onclick="downloadImage('${cleanUrl}', 'Tonir-${i+1}.jpg'); event.stopPropagation();">↓</div>
                            <img src="${cleanUrl}" onclick="openLightbox('${cleanUrl}')">
                        `;
                        gallery.appendChild(div);
                    }
                });
            });

        function openLightbox(url) {
            document.getElementById("lightboxImg").src = url;
            document.getElementById("lightboxDl").onclick = () => downloadImage(url, 'Tonir-Original.jpg');
            document.getElementById("myLightbox").style.display = "flex";
        }
        function closeLightbox() { document.getElementById("myLightbox").style.display = "none"; }

        function downloadImage(url, filename) {
            fetch(url)
                .then(res => res.blob())
                .then(blob => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                })
                .catch(err => window.open(url, '_blank'));
        }
    </script>
</body>
</html>
